<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Metronome</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Smart Metronome</h1>

        <div id="beat-indicators" class="beat-indicators"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="metronom">Metronom</button>
            <button class="tab-btn" data-tab="dynamik">Dynamik</button>
            <button class="tab-btn" data-tab="analyse">Songs</button>
        </div>

        <!-- ── Tab: Metronom ── -->
        <div id="tab-metronom" class="tab-panel active">
            <div class="controls">
                <div class="control-group">
                    <label for="bpm">BPM</label>
                    <div class="bpm-row">
                        <button class="adj-btn" id="bpm-minus">&#8722;</button>
                        <input type="number" id="bpm" value="120" min="20" max="300">
                        <button class="adj-btn" id="bpm-plus">+</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>Taktart</label>
                    <div class="time-sig-row">
                        <input type="number" id="numerator" value="4" min="1" max="16">
                        <span class="sig-divider">/</span>
                        <select id="denominator">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="4" selected>4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="subdiv-row">
                <span class="subdiv-label">Unterteilung</span>
                <div class="subdiv-toggle">
                    <button class="subdiv-btn active" data-subdiv="1">1/4</button>
                    <button class="subdiv-btn" data-subdiv="2">1/8</button>
                    <button class="subdiv-btn" data-subdiv="3">Triolen</button>
                    <button class="subdiv-btn" data-subdiv="4">1/16</button>
                </div>
                <label id="subdiv-beats-row" class="subdiv-beats-row">
                    <input type="checkbox" id="subdiv-play-beats" checked>
                    <span>Akzent betonen</span>
                </label>
                <label id="subdiv-distinguish-row" class="subdiv-beats-row subdiv-off">
                    <input type="checkbox" id="subdiv-distinguish" checked disabled>
                    <span>Viertelnoten betonen</span>
                </label>
            </div>

            <button id="tap-btn" class="tap-btn">Tap <span class="tap-key">T</span></button>
        </div>

        <!-- ── Tab: Dynamik ── -->
        <div id="tab-dynamik" class="tab-panel">
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="wiederholungen">Wiederholungen</button>
                <button class="mode-btn" data-mode="zeit">Zeit</button>
            </div>

            <div class="dyn-grid">
                <div class="control-group">
                    <label for="dyn-start">Starttempo</label>
                    <input type="number" id="dyn-start" value="80" min="20" max="300">
                </div>
                <div class="control-group">
                    <label for="dyn-target">Zieltempo</label>
                    <input type="number" id="dyn-target" value="160" min="20" max="300">
                </div>
                <div class="control-group">
                    <label for="dyn-reps" id="dyn-reps-label">Wiederholungen</label>
                    <input type="number" id="dyn-reps" value="4" min="1" max="999">
                </div>
                <div class="control-group">
                    <label for="dyn-step">BPM Anpassung</label>
                    <input type="number" id="dyn-step" value="5" min="1" max="100">
                </div>
            </div>

            <div class="dyn-status">
                <div class="dyn-status-item">
                    <span class="dyn-label">Aktuelles Tempo</span>
                    <span id="dyn-current-bpm" class="dyn-value">—</span>
                </div>
                <div class="dyn-divider"></div>
                <div class="dyn-status-item">
                    <span class="dyn-label">Wiederholung</span>
                    <span id="dyn-rep-count" class="dyn-value">—</span>
                </div>
            </div>
        </div>

        <!-- ── Tab: Analyse ── -->
        <div id="tab-analyse" class="tab-panel">
            <div id="active-song-bar" class="active-song-bar hidden">
                <span class="active-song-label">Im Metronom</span>
                <span id="active-song-info" class="active-song-info"></span>
                <span id="active-song-bpm" class="active-song-bpm"></span>
            </div>

            <button id="manual-toggle" class="manual-toggle-btn">&#43; Manuell hinzuf&uuml;gen</button>
            <div id="manual-form" class="manual-form hidden">
                <div class="manual-fields">
                    <div class="control-group">
                        <label for="manual-artist">Interpret</label>
                        <input type="text" id="manual-artist" class="text-input" placeholder="z. B. AC/DC">
                    </div>
                    <div class="control-group">
                        <label for="manual-title">Titel</label>
                        <input type="text" id="manual-title" class="text-input" placeholder="z. B. Highway to Hell">
                    </div>
                    <div class="control-group">
                        <label for="manual-bpm">BPM</label>
                        <input type="text" inputmode="numeric" id="manual-bpm" class="text-input" placeholder="120">
                    </div>
                </div>
                <button id="manual-add-btn" class="manual-add-btn">Hinzuf&uuml;gen</button>
                <div id="manual-feedback" class="manual-feedback hidden"></div>
            </div>

            <div class="search-row">
                <input type="text" id="song-search" class="text-input" placeholder="In Liste suchen…">
            </div>

            <div id="song-list" class="song-list">
                <p class="song-list-empty">Noch keine Songs gespeichert.</p>
            </div>
        </div>

        <!-- ── Lautstärke ── -->
        <div class="volume-controls">
            <div class="volume-row">
                <span class="vol-label">Akzent</span>
                <input type="range" id="vol-accent" min="0" max="100" value="80">
                <span class="vol-value" id="vol-accent-val">80%</span>
            </div>
            <div class="volume-row">
                <span class="vol-label">Normal</span>
                <input type="range" id="vol-normal" min="0" max="100" value="60">
                <span class="vol-value" id="vol-normal-val">60%</span>
            </div>
            <div class="volume-row subdiv-off" id="vol-subdiv-row">
                <span class="vol-label">Subdiv</span>
                <input type="range" id="vol-subdiv" min="0" max="100" value="35" disabled>
                <span class="vol-value" id="vol-subdiv-val">35%</span>
            </div>
        </div>

        <button id="play-pause-btn" class="play-btn">Play</button>

        <p class="hint">Leertaste: Play / Pause</p>
    </div>

    <script src="{{ url_for('static', filename='metronome.js') }}"></script>
</body>
</html>
